## Here to start to write my first deployment file in my Zero_Project

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-app-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-app
  template: 
      metadata: 
        labels:
	  app: api-app
      spec: 
	    containers:
	      - name: main-container
	      image: ghcr.io/BaiterYu0101/api-app: latest
	      ports:
	      - containerPort: 8000
          

